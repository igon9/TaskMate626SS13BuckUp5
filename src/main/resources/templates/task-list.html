<!-- ------------検索エリア全体をカード風にする③　↓--------- -->

	<div class="card p-3 mb-4">
     <h2 class="mb-3">タスク検索</h2>
	 <form th:action="@{/task-search-list}" method="POST" th:object="${taskSearchListForm}">
	 		<table class="condition-table">
	 			<tr>
	 				<th>【タスク名】（部分一致）</th>
	 				<th>【期限】</th>
	 				<th>【ステータス】</th>
	 			</tr>
	 			<tr>
	 				<td><input type="text" th:field="*{taskName}"></td>
	 				<td><input type="date" th:field="*{limitDate}"> 以前</td>
	 				<td>
	 					<select th:field="*{statusCode}">
	 						<option value="">(全て)</option>
	 						<option th:each="status : ${statusList}" th:value="${status.statusCode}"
	 							th:text="${status.statusCode + ':' + status.statusName}"
	 							th:selected="${status.statusCode == statusCode}">
	 						</option>
	 					</select>
	 				</td>
	 			</tr>
	 		</table>
			<input type="submit" value="検索" class="btn btn-search mt-3">
			</form>
	</div>

<!-- ------------検索エリア全体をカード風にする③　↑--------- -->

	<!-- ------------一覧---------------- -->
	<div th:if="${taskSummaryList} != null">
		
		
		<div class="container mt-4">

		    <h2 class="mb-3">タスク一覧</h2>

		    <table class="table table-striped table-hover align-middle">
		        <thead class="table-dark">
		        <tr>
		            <th>詳細</th>
		            <th>ID</th>
		            <th>タスク名</th>
		            <th>期限</th>
		            <th>ステータス</th>
		            <th>メモ件数</th>
		        </tr>
		        </thead>
		        <tbody>
		        <tr th:each="task : ${taskSummaryList}">
		            <td>
		                <form th:action="@{/task-search-detail}" method="POST">
		                    <input type="hidden" name="taskId" th:value="${task.taskId}">
		                    <!--<button class="btn btn-sm btn-primary">詳細</button> -->
							<button class="btn btn-sm btn-detail">詳細</button>

		                </form>
		            </td>
		            <td th:text="${task.taskId}"></td>
		            <td th:text="${task.taskName}"></td>
		            <td th:text="${task.limitDate}"></td>
		            <td th:text="${task.status.statusCode + ':' + task.status.statusName}"></td>
		            <td th:text="${task.memoCnt}"></td>
		        </tr>
		        </tbody>
		    </table>

		</div>
